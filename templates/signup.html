<!DOCTYPE html>
<html>
<head>
    <title>Sign Up - Blood Bank System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center" style="height: 100vh;">

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <h3 class="text-center text-danger mb-4">Hospital Sign Up</h3>
                    
                    {% if error %}
                    <div class="alert alert-danger">{{ error }}</div>
                    {% endif %}

                    <form action="/signup" method="POST">
                        <div class="mb-3">
                            <label class="form-label">Hospital Name</label>
                            <input type="text" name="hospitalname" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Username</label>
                            <input type="text" name="username" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Password</label>
                            <input type="password" name="password" class="form-control" required>
                        </div>
                        <button type="submit" class="btn btn-danger w-100 mb-3">Create Account</button>
                    </form>
                    
                    <div class="text-center">
                        <span class="text-muted">Already have an account?</span> 
                        <a href="/login" class="text-danger fw-bold text-decoration-none">Log In here</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
