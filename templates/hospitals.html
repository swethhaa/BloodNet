<!DOCTYPE html>
<html>
<head>
    <title>Hospitals</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-danger shadow-sm py-3 mb-4 border-bottom border-4 border-danger border-opacity-75">
    <div class="container d-flex justify-content-between align-items-center">
        <a href="/dashboard" class="navbar-brand fw-bold fs-4 mb-0 text-decoration-none">
            BloodNet
        </a>
        <div class="d-flex gap-2 flex-wrap">
            <a href="/dashboard" class="btn btn-outline-light border-0 px-3 fw-semibold">Dashboard</a>
            <a href="/donors" class="btn btn-outline-light border-0 px-3 fw-semibold">Donors</a>
            <a href="/bloodstock" class="btn btn-outline-light border-0 px-3 fw-semibold">Stock</a>
            <a href="/hospitals" class="btn btn-outline-light border-0 px-3 fw-semibold">Hospitals</a>
            <a href="/requests" class="btn btn-outline-light border-0 px-3 fw-semibold">Requests</a>
            <a href="/logout" class="btn btn-outline-light border-0 px-3 fw-semibold text-warning">Logout</a>
        </div>
    </div>
</nav>

<div class="container mt-4">

    <h3>Hospitals</h3>

    <table class="table table-bordered mt-3">
        <tr>
            <th>ID</th>
            <th>Hospital Name</th>
            <th>Username</th>
        </tr>

        {% for h in hospitals %}
        <tr>
            <td>{{ h[0] }}</td>
            <td>{{ h[1] }}</td>
            <td><span class="badge bg-secondary">{{ h[2] if h|length > 2 else 'N/A' }}</span></td>
        </tr>
        {% endfor %}
    </table>

</div>

</body>
</html>
