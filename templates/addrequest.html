<!DOCTYPE html>
<html>
<head>
    <title>Add Request</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-danger shadow-sm py-3 mb-4 border-bottom border-4 border-danger border-opacity-75">
    <div class="container d-flex justify-content-between align-items-center">
        <a href="/dashboard" class="navbar-brand fw-bold fs-4 mb-0 text-decoration-none">
            Blood Bank System
        </a>
        <div class="d-flex gap-2 flex-wrap">
            <a href="/hospital_dashboard" class="btn btn-outline-light border-0 px-3 fw-semibold">My Requests</a>
            <a href="/logout" class="btn btn-outline-light border-0 px-3 fw-semibold">Logout</a>
        </div>
    </div>
</nav>

<div class="container mt-5">
    <div class="card p-4 shadow">
        <h3>Request Blood Units</h3>

        <form method="POST">
            <input type="text" name="bloodgroup" class="form-control mb-3" placeholder="Blood Group (e.g. O+)" required>
            <input type="number" name="units" class="form-control mb-3" placeholder="Units Needed" required>

            <button class="btn btn-primary w-100">Submit</button>
        </form>

    </div>
</div>

</body>
</html>
